alias: Write EA
description: "EXAMPLE automation for writing one extension attribute. Connect this automation to the action 'Update' button for `Graph API Devices` on the `Write Actions` tab of the example dashboard, or use it as a template for your own automations."
triggers: []
conditions: []
actions:
  - action: ha_ms_graph_api.update_device_extension_attribute
    metadata: {}
    data:
      device_name: "{{ states('select.graph_api_device_selector') }}"
      value: "{{ states('text.graph_api_extension_attribute_editor') }}"
      attribute_number: >-
        {{ state_attr('select.graph_api_extension_attribute_selector',
        'attribute_number') | int }}
  - action: homeassistant.update_entity
    metadata: {}
    data:
      entity_id:
        - sensor.graph_api_device_extension_attributes
mode: single
