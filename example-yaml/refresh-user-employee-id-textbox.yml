alias: Refresh User Employee ID Text Box
description: "EXAMPLE automation for refreshing the user employee ID text box. This automation is triggered when the user employee ID changes in `Graph API Users` on the `Write Actions` tab of the example dashboard."
triggers:
  - trigger: state
    entity_id:
      - sensor.graph_api_user_employee_id
conditions: []
actions:
  - if:
      - condition: template
        value_template: "{{ states('sensor.graph_api_user_employee_id') != \"Not available\" }}"
    then:
      - action: text.set_value
        target:
          entity_id:
            - text.graph_api_user_employee_id_editor
        data:
          value: "{{ states('sensor.graph_api_user_employee_id') }}"
    else:
      - action: text.set_value
        target:
          entity_id:
            - text.graph_api_user_employee_id_editor
        data:
          value: ""
mode: single
